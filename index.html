<!doctype html>
<html lang="ru" class="dark">
<head>
  <meta charset="UTF-8">
  <title>Trip Tracker</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#020617">

  <script>
    tailwind = { config: { darkMode: 'class' } };
  </script>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body{background:#020617;color:#f9fafb;font-family:system-ui,sans-serif;}
    html:not(.dark) body{background:#e5e7eb;color:#020617;}
    .glass{background:rgba(15,23,42,.85);border:1px solid rgba(148,163,184,.35);backdrop-filter:blur(14px);}
    html:not(.dark) .glass{background:rgba(255,255,255,.9);border-color:rgba(148,163,184,.5);}
    .recording{animation:pulse 1.4s infinite;background:#ef4444!important;color:#fff!important;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  </style>
</head>
<body class="p-4">
<div class="max-w-md mx-auto space-y-4 relative pb-10">

  <!-- Theme toggle -->
  <button id="themeToggle" class="absolute -top-1 right-0 p-3 glass rounded-full active:scale-95 transition">
    <i id="themeIcon" data-lucide="sun"></i>
  </button>

  <!-- Top: trip selector + add -->
  <div class="flex items-center justify-between mt-6 mb-1">
    <button id="tripSelectorBtn" class="flex items-center gap-1 text-sm font-semibold glass px-3 py-2 rounded-2xl">
      <span id="tripSelectorLabel">Выберите поездку</span>
      <i data-lucide="chevron-down" class="w-4 h-4"></i>
    </button>
    <button id="newTripBtn" class="w-10 h-10 rounded-full glass flex items-center justify-center active:scale-95">
      <span class="text-xl font-bold">+</span>
    </button>
  </div>

  <!-- Trip selector dropdown -->
  <div id="tripDropdown" class="hidden glass rounded-2xl p-2 text-sm space-y-1 mt-1"></div>

  <!-- Header block -->
  <div class="glass rounded-[28px] p-5 shadow-2xl">
    <div class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-1" id="tripTitle">Путь к мечте</div>
    <div class="text-[11px] text-slate-500 mb-2">Общие расходы</div>
    <div id="totalAmount" class="text-4xl font-black mb-1">0,00 €</div>
    <div id="geo" class="text-[10px] text-cyan-400 font-bold tracking-widest uppercase italic">
      📍 Ожидание GPS...
    </div>
  </div>

  <!-- Category cards -->
  <div class="grid grid-cols-3 gap-2">
    <div class="glass rounded-2xl p-3 flex flex-col justify-between">
      <div class="flex items-center justify-between text-[11px] mb-1">
        <span class="font-semibold">Топливо</span>
        <span class="text-xs" id="fuelPercent">0%</span>
      </div>
      <div class="text-xs text-slate-400 mb-1">⛽</div>
      <div class="text-sm font-bold" id="fuelAmount">0,00 €</div>
    </div>
    <div class="glass rounded-2xl p-3 flex flex-col justify-between">
      <div class="flex items-center justify-between text-[11px] mb-1">
        <span class="font-semibold">Жильё</span>
        <span class="text-xs" id="hotelPercent">0%</span>
      </div>
      <div class="text-xs text-slate-400 mb-1">🏨</div>
      <div class="text-sm font-bold" id="hotelAmount">0,00 €</div>
    </div>
    <div class="glass rounded-2xl p-3 flex flex-col justify-between">
      <div class="flex items-center justify-between text-[11px] mb-1">
        <span class="font-semibold">Питание</span>
        <span class="text-xs" id="foodPercent">0%</span>
      </div>
      <div class="text-xs text-slate-400 mb-1">🍕</div>
      <div class="text-sm font-bold" id="foodAmount">0,00 €</div>
    </div>
  </div>

  <!-- Mic -->
  <button id="micBtn"
          class="w-full h-16 bg-white text-black rounded-3xl font-black text-base flex items-center justify-center gap-2 active:scale-95 transition-all dark:bg-slate-100 dark:text-slate-900">
    <i data-lucide="mic"></i> ЗАПИСАТЬ ГОЛОСОМ
  </button>

  <!-- Filters + search -->
  <div class="glass rounded-3xl p-4 space-y-3">
    <div class="flex items-center justify-between">
      <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Фильтры и поиск</h3>
      <div class="flex gap-2 text-[10px]">
        <button id="exportBtn" class="px-2 py-1 rounded-xl bg-slate-900/60 text-slate-100 dark:bg-slate-100 dark:text-slate-900">Экспорт</button>
        <button id="importBtn" class="px-2 py-1 rounded-xl bg-slate-900/60 text-slate-100 dark:bg-slate-100 dark:text-slate-900">Импорт</button>
        <input id="importFile" type="file" accept=".json" class="hidden">
      </div>
    </div>

    <input id="searchInput" type="text"
           placeholder="Поиск по названию или городу..."
           class="w-full rounded-2xl px-3 py-2 text-sm bg-slate-900/40 border border-slate-700/60 focus:ring-2 focus:ring-cyan-500 dark:bg-slate-900/40">

    <div class="flex gap-2 text-xs">
      <button data-cat="all" class="catBtn flex-1 rounded-2xl px-3 py-2 bg-slate-800 text-slate-100 font-bold">Все</button>
      <button data-cat="fuel" class="catBtn flex-1 rounded-2xl px-3 py-2 bg-slate-900 text-slate-400 font-bold">Топливо</button>
      <button data-cat="hotel" class="catBtn flex-1 rounded-2xl px-3 py-2 bg-slate-900 text-slate-400 font-bold">Жильё</button>
      <button data-cat="food" class="catBtn flex-1 rounded-2xl px-3 py-2 bg-slate-900 text-slate-400 font-bold">Питание</button>
    </div>
  </div>

  <!-- Charts -->
  <div class="space-y-3">
    <h3 class="text-[10px] font-bold text-slate-500 uppercase px-1 tracking-widest">Аналитика расходов</h3>
    <div class="glass p-4 rounded-3xl">
      <div class="text-[11px] mb-2 text-slate-400">По категориям</div>
      <canvas id="pieChart" height="160"></canvas>
    </div>
    <div class="glass p-4 rounded-3xl">
      <div class="text-[11px] mb-2 text-slate-400">Суммы</div>
      <canvas id="barChart" height="160"></canvas>
    </div>
  </div>

  <!-- History -->
  <div class="space-y-2">
    <div class="flex items-center justify-between px-1">
      <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Журнал расходов</h3>
      <span id="historyCount" class="text-[10px] text-slate-400"></span>
    </div>
    <div id="history" class="space-y-3 pb-10"></div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
