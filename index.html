<!doctype html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#07090f">
  <meta name="apple-mobile-web-app-title" content="TripLog">
  <link rel="manifest" href="manifest.json"> <title>TripLog Multi-Currency</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

  <style>
    /* Все ваши стили из предыдущего кода сохраняются */
    :root[data-theme="dark"] {
      --bg:#07090f; --bg2:#0f1525; --surface:rgba(15,22,40,0.88);
      --border:rgba(255,255,255,0.08); --text:#e8eef8; --muted:#5a6a8a;
      --accent:#38bdf8; --accent2:#818cf8; --green:#34d399; --red:#f87171;
      --amber:#fbbf24; --card-shadow:0 8px 32px rgba(0,0,0,0.5);
      --sheet-bg:#0d1628;
    }
    :root[data-theme="light"] {
      --bg:#f0f4f8; --bg2:#ffffff; --surface:rgba(255,255,255,0.92);
      --border:rgba(0,0,0,0.08); --text:#1a2236; --muted:#8899bb;
      --accent:#0284c7; --accent2:#6366f1; --green:#059669; --red:#dc2626;
      --amber:#d97706; --card-shadow:0 4px 20px rgba(0,0,0,0.1);
      --sheet-bg:#f8fafc;
    }

    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{
      background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;
      min-height:100dvh;transition:background .35s,color .35s;
      padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);
    }
    .mono{font-family:'Space Mono',monospace}
    .app{max-width:420px;margin:0 auto;padding:16px 14px 120px}

    /* TOP BAR */
    .topbar{display:flex;align-items:center;gap:8px;margin-bottom:18px}
    .logo{font-weight:900;font-size:18px;letter-spacing:-.5px;flex:1}
    .logo span{color:var(--accent)}
    .trip-chip{
      display:flex;align-items:center;gap:5px;
      background:var(--surface);border:1px solid var(--border);
      border-radius:100px;padding:6px 12px;cursor:pointer;
      font-size:11px;font-weight:700;color:var(--muted);
      transition:border-color .2s;max-width:120px;
    }
    .icon-btn{
      width:40px;height:40px;border-radius:50%;
      border:1px solid var(--border);background:var(--surface);
      color:var(--text);display:flex;align-items:center;justify-content:center;
    }

    /* HERO */
    .hero{
      background:var(--surface);border:1px solid var(--border);
      backdrop-filter:blur(16px);border-radius:28px;padding:24px;
      margin-bottom:14px;box-shadow:var(--card-shadow);
      position:relative;overflow:hidden;
    }
    .hero-label{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
    .hero-total{font-size:52px;font-weight:900;letter-spacing:-2px;line-height:1}
    .hero-total .cents{font-size:28px;opacity:.6}

    /* MIC & CONTROLS */
    .mic-btn{
      width:100%;height:72px;border-radius:22px;background:var(--text);color:var(--bg);
      border:none;cursor:pointer;font-weight:900;font-size:15px;
      display:flex;align-items:center;justify-content:center;gap:10px;
      margin-bottom:14px;box-shadow:0 4px 20px rgba(0,0,0,.25);
    }
    .mic-btn.recording { background: var(--red) !important; color: white !important; }

    .search-row{display:flex;gap:8px;margin-bottom:14px}
    .filter-select{
        height:44px;border-radius:14px;background:var(--surface);border:1px solid var(--border);
        color:var(--text);padding:0 8px;font-size:12px;font-weight:600;
    }

    /* HISTORY */
    .entry{
        background:var(--surface);border:1px solid var(--border);border-radius:18px;
        padding:14px 16px;display:flex;align-items:center;gap:14px;margin-bottom:8px;
    }
    .entry-amount{font-family:'Space Mono',monospace;font-weight:700;font-size:15px;color:var(--accent)}
    
    /* TOAST */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:var(--bg);font-weight:700;padding:12px 22px;border-radius:100px;transition:transform .4s;z-index:9999}
    .toast.show{transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="logo">TRIP<span>.</span>LOG</div>
    <div class="trip-chip" onclick="alert('Меню поездок')">
      <span>🗂</span><span id="tripName">Поездка 1</span>
    </div>
  </div>

  <div class="hero">
    <div class="hero-label">Общие расходы (в Евро)</div>
    <div class="hero-total mono" id="heroTotal">0<span class="cents">,00 €</span></div>
    <div id="geoLabel" style="font-size: 10px; margin-top: 10px; color: var(--green);">● GPS активен</div>
  </div>

  <button class="mic-btn" id="micBtn">
    <span>🎤</span><span id="micLabel">ЗАПИСАТЬ ГОЛОСОМ</span>
  </button>

  <div class="search-row">
    <select class="filter-select" id="currencySelect" title="Текущая валюта">
        <option value="EUR">EUR (€)</option>
        <option value="TRY">TRY (₺) Турция</option>
        <option value="RSD">RSD (дин) Сербия</option>
        <option value="BGN">BGN (лв) Болгария</option>
    </select>
    <select class="filter-select" id="filterCat" style="flex:1">
      <option value="">Все категории</option>
      <option value="fuel">⛽ Топливо</option>
      <option value="hotel">🏨 Жильё</option>
      <option value="food">🍕 Питание</option>
      <option value="other">📦 Прочее</option>
    </select>
  </div>

  <div id="history"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/** * КОНФИГУРАЦИЯ ВАЛЮТ 
 * Обновите курсы перед поездкой
 */
const CURRENCIES = {
  'EUR': { symbol: '€', rate: 1, keywords: ['евро', 'евр', 'euro'] },
  'TRY': { symbol: '₺', rate: 0.028, keywords: ['лир', 'лира', 'лиры', 'try'] },
  'RSD': { symbol: 'дин', rate: 0.0085, keywords: ['динар', 'динаров', 'дин', 'rsd'] },
  'BGN': { symbol: 'лв', rate: 0.51, keywords: ['лев', 'лева', 'левов', 'лв', 'bgn'] }
};

let entries = JSON.parse(localStorage.getItem('triplog_entries') || '[]');

// --- ИНИЦИАЛИЗАЦИЯ ---
function init() {
    render();
    setupVoice();
}

// --- ГОЛОСОВОЕ УПРАВЛЕНИЕ ---
function setupVoice() {
    const micBtn = document.getElementById('micBtn');
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (!SpeechRecognition) {
        micBtn.style.display = 'none';
        return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = 'ru-RU';
    recognition.interimResults = false;

    micBtn.onclick = () => {
        recognition.start();
        micBtn.classList.add('recording');
        document.getElementById('micLabel').innerText = 'СЛУШАЮ...';
    };

    recognition.onresult = (event) => {
        const text = event.results[0][0].transcript.toLowerCase();
        parseEntry(text);
    };

    recognition.onend = () => {
        micBtn.classList.remove('recording');
        document.getElementById('micLabel').innerText = 'ЗАПИСАТЬ ГОЛОСОМ';
    };
}

// --- ПАРСИНГ ТЕКСТА ---
function parseEntry(text) {
    // Пример: "Бензин 500 лир" или "Обед 20 евро"
    const amountMatch = text.match(/\d+/);
    if (!amountMatch) {
        showToast("Не услышал сумму");
        return;
    }

    const amount = parseFloat(amountMatch[0]);
    let category = 'other';
    let currency = document.getElementById('currencySelect').value;

    // Определяем категорию
    if (text.includes('бензин') || text.includes('топливо') || text.includes('газ')) category = 'fuel';
    if (text.includes('отель') || text.includes('жилье') || text.includes('ночлег')) category = 'hotel';
    if (text.includes('еда') || text.includes('обед') || text.includes('ужин') || text.includes('ресторан')) category = 'food';

    // ОПРЕДЕЛЕНИЕ ВАЛЮТЫ ИЗ ГОЛОСА
    for (const [code, info] of Object.entries(CURRENCIES)) {
        if (info.keywords.some(kw => text.includes(kw))) {
            currency = code;
            break;
        }
    }

    const newEntry = {
        id: Date.now(),
        title: text.replace(/\d+/g, '').replace(/(евро|лир|динар|лев|бензин|отель|еда|обед|ужин)/gi, '').trim() || 'Расход',
        amount: amount,
        currency: currency,
        category: category,
        date: new Date().toISOString()
    };

    entries.unshift(newEntry);
    save();
    showToast(`Записано: ${amount} ${CURRENCIES[currency].symbol}`);
}

// --- СОХРАНЕНИЕ И РЕНДЕР ---
function save() {
    localStorage.setItem('triplog_entries', JSON.stringify(entries));
    render();
}

function render() {
    const historyCont = document.getElementById('history');
    const heroTotal = document.getElementById('heroTotal');
    const filterCat = document.getElementById('filterCat').value;
    
    historyCont.innerHTML = '';
    let totalEur = 0;

    entries.forEach(entry => {
        const rate = CURRENCIES[entry.currency]?.rate || 1;
        const inEur = entry.amount * rate;
        totalEur += inEur;

        if (filterCat && entry.category !== filterCat) return;

        const div = document.createElement('div');
        div.className = 'entry';
        div.innerHTML = `
            <div style="font-size:24px">${getIcon(entry.category)}</div>
            <div style="flex:1">
                <div style="font-weight:700">${entry.title}</div>
                <div style="font-size:10px; color:var(--muted)">${new Date(entry.date).toLocaleTimeString()}</div>
            </div>
            <div class="entry-amount">${entry.amount} ${CURRENCIES[entry.currency].symbol}</div>
            <button onclick="deleteEntry(${entry.id})" style="background:none; border:none; color:var(--muted); margin-left:10px">✕</button>
        `;
        historyCont.appendChild(div);
    });

    const parts = totalEur.toFixed(2).split('.');
    heroTotal.innerHTML = `${parts[0]}<span class="cents">,${parts[1]} €</span>`;
}

function getIcon(cat) {
    const icons = { fuel: '⛽', hotel: '🏨', food: '🍕', other: '📦' };
    return icons[cat] || '💰';
}

function deleteEntry(id) {
    entries = entries.filter(e => e.id !== id);
    save();
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

document.getElementById('filterCat').onchange = render;

init();
</script>
</body>
</html>
