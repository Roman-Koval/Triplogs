<!doctype html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#07090f">
  <link rel="manifest" href="manifest.json">
  <title>TripLog Ultimate</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:#07090f; --bg2:#0f1525; --surface:rgba(15,22,40,0.88);
      --border:rgba(255,255,255,0.08); --text:#e8eef8; --muted:#5a6a8a;
      --accent:#38bdf8; --green:#34d399; --red:#f87171; --sheet-bg:#0d1628;
    }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; padding-bottom:120px; }
    .mono { font-family:'Space Mono',monospace; }
    .app { max-width:420px; margin:0 auto; padding:16px; }

    /* HEADER & TRIP SELECTOR */
    .header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
    .trip-badge { background:var(--surface); border:1px solid var(--border); padding:8px 16px; border-radius:100px; display:flex; align-items:center; gap:8px; cursor:pointer; font-size:13px; font-weight:700; }

    /* HERO */
    .hero { background:var(--surface); border:1px solid var(--border); border-radius:28px; padding:24px; margin-bottom:14px; box-shadow:0 8px 32px rgba(0,0,0,0.5); }
    .hero-val { font-size:52px; font-weight:900; letter-spacing:-2px; line-height:1; }
    .hero-val span { font-size:24px; opacity:0.6; }

    /* STATS GRID */
    .stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:14px; }
    .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:12px; text-align:center; }
    .stat-card b { display:block; color:var(--accent); font-family:'Space Mono'; font-size:14px; margin-top:5px; }

    /* MAIN BUTTONS */
    .mic-btn { width:100%; height:72px; border-radius:22px; background:#fff; color:#000; border:none; font-weight:900; font-size:15px; display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:12px; }
    .mic-btn.active { background:var(--red); color:#fff; animation:pulse 1s infinite; }
    @keyframes pulse { 50% { opacity:0.7; } }

    /* CHARTS */
    .charts { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
    .chart-box { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:15px; height:120px; }
    .chart-label { font-size:9px; font-weight:800; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
    .bar-cont { display:flex; align-items:flex-end; gap:4px; height:60px; }
    .bar { background:var(--accent); flex:1; border-radius:3px; transition:height 0.4s; }

    /* LIST */
    .entry { background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:14px; display:flex; align-items:center; gap:12px; margin-bottom:8px; }
    .entry-info { flex:1; min-width:0; }
    .entry-info b { display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .entry-amt { font-family:'Space Mono'; font-weight:700; color:var(--accent); }

    /* SHEETS (MODALS) */
    .sheet-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(10px); display:none; align-items:flex-end; z-index:1000; }
    .sheet { width:100%; background:var(--sheet-bg); border-radius:30px 30px 0 0; padding:24px; max-height:90vh; overflow-y:auto; transform:translateY(100%); transition:0.3s; }
    .sheet-overlay.active { display:flex; }
    .sheet-overlay.active .sheet { transform:translateY(0); }

    /* EXPORT BUTTONS GRID */
    .export-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:20px; }
    .exp-btn { background:var(--surface); border:1px solid var(--border); border-radius:15px; padding:15px; text-align:center; cursor:pointer; }
    .exp-btn img, .exp-btn span { display:block; font-size:24px; margin-bottom:8px; }
    .exp-btn label { font-size:11px; font-weight:700; }

    .share-main { width:100%; padding:18px; border-radius:18px; background:var(--text); color:var(--bg); border:none; font-weight:900; margin-top:15px; }
  </style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="trip-badge" onclick="showTripManager()">
      <span>📂</span> <span id="currentTripName">Путь к мечте</span>
    </div>
    <select id="currencyMain" class="trip-badge" style="background:none; border-color:transparent">
      <option value="EUR">EUR (€)</option>
      <option value="TRY">TRY (₺)</option>
      <option value="RSD">RSD (дин)</option>
    </select>
  </div>

  <div class="hero">
    <div class="hero-val mono" id="totalEur">0<span>,00 €</span></div>
    <div id="gpsStatus" style="font-size:10px; margin-top:10px; color:var(--accent)">📍 Поиск GPS...</div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">⛽<b id="s-fuel">0€</b></div>
    <div class="stat-card">🏨<b id="s-hotel">0€</b></div>
    <div class="stat-card">🍕<b id="s-food">0€</b></div>
  </div>

  <button class="mic-btn" id="micBtn">🎤 ЗАПИСАТЬ ГОЛОСОМ</button>
  
  <div class="header" style="margin-top:20px">
    <input type="text" id="search" placeholder="Поиск..." style="background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:10px; color:#fff; flex:1; margin-right:10px">
    <button class="trip-badge" onclick="showExportMenu()">📤 Поделиться</button>
  </div>

  <div class="charts">
    <div class="chart-box">
      <div class="chart-label">Категории</div>
      <svg id="pie" viewBox="0 0 40 40" style="width:60px; height:60px; transform:rotate(-90deg)"></svg>
    </div>
    <div class="chart-box">
      <div class="chart-label">Суммы (EUR)</div>
      <div class="bar-cont" id="barCont"></div>
    </div>
  </div>

  <div id="history"></div>
</div>

<div class="sheet-overlay" id="exportOverlay" onclick="if(event.target===this)closeModals()">
  <div class="sheet">
    <div style="text-align:center; margin-bottom:20px">
      <h2 style="font-weight:900">📥 Экспорт и обмен</h2>
      <p style="font-size:12px; color:var(--muted)">Выберите формат данных для поездки</p>
    </div>
    <div class="export-grid">
      <div class="exp-btn" onclick="exportData('csv')">📊<label>Скачать CSV</label></div>
      <div class="exp-btn" onclick="exportData('json')">💾<label>Скачать JSON</label></div>
      <div class="exp-btn" onclick="copyText()">📋<label>Копировать текст</label></div>
      <div class="exp-btn" onclick="alert('HTML квитанция в разработке')">🧾<label>Квитанция HTML</label></div>
    </div>
    <button class="share-main" onclick="navigator.share({title:'Мои расходы', url:window.location.href})">ПОДЕЛИТЬСЯ</button>
    <button onclick="closeModals()" style="width:100%; padding:20px; background:none; border:none; color:var(--muted)">Отмена</button>
  </div>
</div>

<div class="sheet-overlay" id="tripOverlay" onclick="if(event.target===this)closeModals()">
  <div class="sheet">
    <h2 style="margin-bottom:15px">Мои поездки</h2>
    <div id="tripList"></div>
    <button class="share-main" style="background:var(--accent); color:#fff" onclick="createNewTrip()">+ НОВАЯ ПОЕЗДКА</button>
    <button onclick="closeModals()" style="width:100%; padding:20px; border:none; background:none; color:var(--muted)">Закрыть</button>
  </div>
</div>

<script>
const CURR = { 
  'EUR': {r:1, s:'€', kw:['евро']}, 
  'TRY': {r:0.028, s:'₺', kw:['лир']}, 
  'RSD': {r:0.0085, s:'дин', kw:['динар']} 
};

let trips = JSON.parse(localStorage.getItem('trips_v3') || '[{"id":1,"name":"Путь к мечте","active":true}]');
let entries = JSON.parse(localStorage.getItem('entries_v3') || '[]');
let userLoc = null;

// GPS
navigator.geolocation.watchPosition(p => {
  userLoc = { lat: p.coords.latitude, lng: p.coords.longitude };
  document.getElementById('gpsStatus').innerText = `📍 GPS: ${userLoc.lat.toFixed(3)}, ${userLoc.lng.toFixed(3)}`;
}, null, {enableHighAccuracy:true});

// Voice
const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
if(Rec) {
  const r = new Rec(); r.lang = 'ru-RU';
  r.onstart = () => document.getElementById('micBtn').classList.add('active');
  r.onend = () => document.getElementById('micBtn').classList.remove('active');
  r.onresult = (e) => parse(e.results[0][0].transcript.toLowerCase());
  document.getElementById('micBtn').onclick = () => r.start();
}

function parse(txt) {
  const amt = parseFloat(txt.match(/\d+/)?.[0] || 0);
  if(!amt) return;
  
  let cat = 'other';
  if(txt.match(/бензин|топливо/)) cat = 'fuel';
  else if(txt.match(/отель|жилье/)) cat = 'hotel';
  else if(txt.match(/еда|обед|ужин/)) cat = 'food';

  let cCode = document.getElementById('currencyMain').value;
  for(let k in CURR) if(CURR[k].kw.some(w => txt.includes(w))) cCode = k;

  const activeTrip = trips.find(t => t.active);
  entries.unshift({
    id: Date.now(), tripId: activeTrip.id, title: txt.replace(/\d+/,'').trim() || 'Расход',
    amt, curr: cCode, cat, loc: userLoc, date: new Date().toISOString()
  });
  save();
}

function save() {
  localStorage.setItem('trips_v3', JSON.stringify(trips));
  localStorage.setItem('entries_v3', JSON.stringify(entries));
  render();
}

function render() {
  const activeTrip = trips.find(t => t.active);
  document.getElementById('currentTripName').innerText = activeTrip.name;
  
  const tripEntries = entries.filter(e => e.tripId === activeTrip.id);
  const list = document.getElementById('history');
  list.innerHTML = '';
  
  let total = 0, st = {fuel:0, hotel:0, food:0, other:0};
  
  tripEntries.forEach(e => {
    const val = e.amt * CURR[e.curr].r;
    total += val; st[e.cat] += val;
    
    const div = document.createElement('div');
    div.className = 'entry';
    div.innerHTML = `
      <div style="font-size:24px">${{fuel:'⛽',hotel:'🏨',food:'🍕'}[e.cat]||'📦'}</div>
      <div class="entry-info"><b>${e.title}</b><small>${new Date(e.date).toLocaleTimeString()}</small></div>
      <div class="entry-amt">${e.amt}${CURR[e.curr].s}</div>
    `;
    list.appendChild(div);
  });

  document.getElementById('totalEur').innerHTML = `${total.toFixed(2).split('.')[0]}<span>,${total.toFixed(2).split('.')[1]} €</span>`;
  document.getElementById('s-fuel').innerText = st.fuel.toFixed(0)+'€';
  document.getElementById('s-hotel').innerText = st.hotel.toFixed(0)+'€';
  document.getElementById('s-food').innerText = st.food.toFixed(0)+'€';
  
  drawCharts(st);
}

function drawCharts(st) {
  const bar = document.getElementById('barCont'); bar.innerHTML = '';
  const max = Math.max(...Object.values(st), 1);
  Object.values(st).forEach(v => {
    bar.innerHTML += `<div class="bar" style="height:${(v/max)*100}%"></div>`;
  });
}

// UI Modals
function showExportMenu() { document.getElementById('exportOverlay').classList.add('active'); }
function showTripManager() {
  const list = document.getElementById('tripList');
  list.innerHTML = trips.map(t => `
    <div class="entry" onclick="switchTrip(${t.id})" style="border:${t.active?'1px solid var(--accent)':'none'}">
      <div style="flex:1"><b>${t.name}</b></div>
      ${t.active ? '✅' : ''}
    </div>
  `).join('');
  document.getElementById('tripOverlay').classList.add('active');
}
function closeModals() { document.querySelectorAll('.sheet-overlay').forEach(o => o.classList.remove('active')); }

function switchTrip(id) {
  trips.forEach(t => t.active = (t.id === id));
  save(); closeModals();
}

function createNewTrip() {
  const name = prompt('Назовите поездку:');
  if(!name) return;
  trips.forEach(t => t.active = false);
  trips.push({id:Date.now(), name, active:true});
  save(); closeModals();
}

function exportData(type) {
  const data = JSON.stringify(entries.filter(e => e.tripId === trips.find(t=>t.active).id));
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = `trip.${type}`; a.click();
}

render();
</script>
</body>
</html>
